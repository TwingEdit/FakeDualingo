<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukraynaca Öğren | Ana Sayfa</title>
    <style>
        body { font-family: sans-serif; background-color: #131f24; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; max-width: 480px; display: flex; justify-content: space-around; padding: 15px 0; background: #131f24; border-bottom: 2px solid #3b4d57; position: sticky; top: 0; }
        .stat { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        
        .path-container { padding: 40px 0; display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 480px; }
        
        .unit-header { background: #58cc02; width: 90%; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .unit-header h2 { margin: 0; font-size: 1rem; text-transform: uppercase; opacity: 0.8; }
        .unit-header p { margin: 5px 0 0; font-weight: bold; font-size: 1.2rem; }

        .node { width: 80px; height: 70px; background: #58cc02; border-radius: 50%; border-bottom: 8px solid #46a302; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; text-decoration: none; color: white; transition: 0.1s; }
        .node:active { transform: translateY(4px); border-bottom-width: 2px; }
        .node.locked { background: #3b4d57; border-color: #2b3a42; cursor: default; opacity: 0.5; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #131f24; border-top: 2px solid #3b4d57; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { font-size: 1.5rem; opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: #1cb0f6; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stat">🇺🇦</div>
        <div class="stat">🔥 1</div>
        <div class="stat">💎 825</div>
    </div>

    <div class="path-container">
        <div class="unit-header">
            <h2>Bölüm 1, Ünite 1</h2>
            <p>Alfabeyi Öğren</p>
        </div>

        <a href="lesson.html" class="node">⭐</a>
        
        <div class="node locked">🔒</div>
        <div class="node locked" style="margin-right: -50px;">🔒</div>
        <div class="node locked">🔒</div>
        <div class="node locked" style="margin-left: -50px;">🔒</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">📖</div>
        <div class="nav-item">🏆</div>
        <div class="nav-item">👤</div>
    </div>

</body>
</html>
