<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukraynaca Ders</title>
    <style>
        body { font-family: sans-serif; background-color: #131f24; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .close-btn { font-size: 1.8rem; cursor: pointer; text-decoration: none; color: #afafaf; }
        .prog-bg { flex-grow: 1; height: 14px; background: #3b4d57; border-radius: 10px; }
        .prog-fill { width: 30%; height: 100%; background: #58cc02; border-radius: 10px; transition: 0.5s; }
        .content { flex-grow: 1; padding: 25px; max-width: 480px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        h1 { font-size: 1.6rem; margin-top: 10px; }
        .q-box { display: flex; align-items: center; gap: 15px; margin: 40px 0; }
        .char { font-size: 3.5rem; }
        .bubble { background: white; color: black; padding: 15px 25px; border-radius: 18px; position: relative; font-size: 1.3rem; font-weight: bold; box-shadow: 4px 4px 0 rgba(0,0,0,0.2); }
        .options { display: grid; gap: 12px; margin-top: 20px; }
        .opt { background: #131f24; border: 2px solid #3b4d57; border-bottom: 5px solid #3b4d57; border-radius: 15px; color: white; padding: 18px; font-size: 1.2rem; cursor: pointer; text-align: left; }
        .opt.selected { background: #202f36; border-color: #1cb0f6; color: #1cb0f6; }
        .footer { border-top: 2px solid #3b4d57; padding: 25px; display: flex; flex-direction: column; align-items: center; background: #131f24; }
        .check-btn { width: 100%; max-width: 430px; padding: 18px; border-radius: 16px; border: none; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-off { background: #3b4d57; color: #7a8a92; }
        .btn-on { background: #58cc02; color: white; border-bottom: 5px solid #46a302; }
        .result-msg { margin-bottom: 15px; font-size: 1.3rem; font-weight: bold; display: none; width: 100%; }
    </style>
</head>
<body>
    <div class="header"><a href="index.html" class="close-btn">✕</a><div class="prog-bg"><div class="prog-fill"></div></div></div>
    <div class="content">
        <h1>Bu cümleyi çevir</h1>
        <div class="q-box">
            <div class="char">🦉</div>
            <div class="bubble">Так, тато!</div>
        </div>
        <div class="options">
            <button class="opt" onclick="sel(this, 'Evet')">Evet, baba!</button>
            <button class="opt" onclick="sel(this, 'Hayır')">Hayır, dede!</button>
            <button class="opt" onclick="sel(this, 'Selam')">Selam, anne!</button>
        </div>
    </div>
    <div class="footer" id="foot">
        <div id="msg" class="result-msg">Harika! Doğru.</div>
        <button class="check-btn btn-off" id="btn" disabled onclick="verify()">Kontrol Et</button>
    </div>
    <script>
        let s = "";
        const b = document.getElementById('btn');
        const f = document.getElementById('foot');
        const m = document.getElementById('msg');
        function sel(el, val) {
            document.querySelectorAll('.opt').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected'); s = val; b.disabled = false; b.className = "check-btn btn-on";
        }
        function verify() {
            if(s === 'Evet') {
                f.style.background = "#d7ffb8"; m.style.display = "block"; m.style.color = "#185a00";
                b.innerText = "Devam Et"; b.onclick = () => location.href="index.html";
                const v = new SpeechSynthesisUtterance("Так, тато"); v.lang = 'uk-UA'; window.speechSynthesis.speak(v);
            } else { alert("Yanlış! Tekrar dene."); }
        }
    </script>
</body>
</html>
